name: Build Plugins

on:
  push:
  workflow_dispatch:

jobs:
  build-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build proxy plugin
        working-directory: proxycoins-http-core-1.0.0/proxycoins-http-core
        run: mvn clean package

      - name: Upload proxy jar
        uses: actions/upload-artifact@v4
        with:
          name: ProxyCoinsHttpCore
          path: proxycoins-http-core-1.0.0/proxycoins-http-core/target/*.jar

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build server plugin
        working-directory: arsya-premium-bridge-http-1.0.0/arsya-premium-bridge-http
        run: mvn clean package

      - name: Upload server jar
        uses: actions/upload-artifact@v4
        with:
          name: ArsyaPremiumBridgeHttp
          path: arsya-premium-bridge-http-1.0.0/arsya-premium-bridge-http/target/*.jar
